appId: com.ytgrabber.app
productName: YTGrabber
copyright: Copyright © 2026 Harry Wang

directories:
  output: dist-electron

files:
  - "electron/**/*"
  - "package.json"
  - "!node_modules"
  - "!dist-electron"
  - "!src"
  - "!public"
  - "!scripts"
  - "!build"

asarUnpack:
  - "electron/server/**/*"

mac:
  category: public.app-category.utilities
  icon: build/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: electron/entitlements.mac.plist
  entitlementsInherit: electron/entitlements.mac.plist
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false

dmg:
  title: "YTGrabber"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: "/Applications"
