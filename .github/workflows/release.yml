name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build macOS DMGs
        run: pnpm electron:build:mac
        env:
          STANDALONE: "true"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build Windows installer
        run: pnpm electron:build:win
        env:
          STANDALONE: "true"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
