name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build macOS DMGs
        run: pnpm electron:build:mac

      - name: Upload DMGs
        uses: actions/upload-artifact@v7
        with:
          name: mac-dmgs
          path: |
            dist-electron/*.dmg

  build-win:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build Windows installer
        run: pnpm electron:build:win

      - name: Upload exe
        uses: actions/upload-artifact@v7
        with:
          name: win-exe
          path: |
            dist-electron/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: mac-dmgs
          path: artifacts

      - uses: actions/download-artifact@v8
        with:
          name: win-exe
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
